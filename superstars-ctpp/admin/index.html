<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Admin · Super Stars CTPP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0D1B2A;color:#E8E4DE;font-size:15px;line-height:1.5}
:root{
  --g:#2D6A4F;--gl:#40916C;--gp:rgba(45,106,79,.15);
  --go:#F4A828;--gop:rgba(244,168,40,.15);
  --red:#C0392B;--redp:rgba(192,57,43,.15);
  --ni:#0D1B2A;--sl:#1B2B3A;--mi:#243447;--hi:#2d3f52;
  --tx:#E8E4DE;--mu:rgba(232,228,222,.5);
  --bd:rgba(232,228,222,.1);--bd2:rgba(232,228,222,.18);
  --r:8px;--rl:12px;
}

/* ── LAYOUT ─────────── */
#app{min-height:100vh;display:flex;flex-direction:column}

/* ── ADMIN NAV ──────── */
.admin-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,27,42,.98);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  gap:0;min-height:54px;
  backdrop-filter:blur(10px);
}
.admin-brand{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;letter-spacing:.08em;line-height:1;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;padding-right:16px;border-right:1px solid var(--bd);
}
.admin-brand .v1{color:#F7F4EF}.admin-brand .v2{color:var(--go)}
.admin-tag{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);background:var(--bd);padding:2px 7px;border-radius:20px;font-weight:500}
.admin-nav-links{display:flex;align-items:center;margin-left:8px;flex:1}
.nav-btn{background:none;border:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:16px 12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{color:var(--tx)}.nav-btn.active{color:var(--go);border-bottom-color:var(--go)}
.nav-icon{font-size:14px}.nav-lbl{display:inline}
.btn-logout{background:none;border:1px solid var(--bd2);color:var(--mu);border-radius:6px;padding:7px 10px;cursor:pointer;font-size:15px;margin-left:8px;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-logout:hover{color:var(--red);border-color:var(--red)}
.btn-logout svg{width:16px;height:16px;display:block}
/* HAMBURGER MOBILE */
.admin-nav-right{display:flex;align-items:center;gap:0;margin-left:auto}
.admin-burger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--tx);flex-shrink:0}
.admin-mobile{display:none;position:fixed;top:54px;left:0;right:0;bottom:0;z-index:99;background:rgba(13,27,42,.98);backdrop-filter:blur(16px);flex-direction:column;align-items:stretch;padding:12px 0 24px;border-top:1px solid var(--bd)}
.admin-mobile.open{display:flex}
.admin-mobile .nav-btn{font-size:1rem;letter-spacing:.08em;padding:18px 28px;border-bottom:1px solid var(--bd);margin-bottom:0;width:100%;text-align:left;justify-content:flex-start}
.admin-mobile .nav-btn:last-child{border-bottom:none}
.admin-mobile .nav-btn.active{color:var(--go);border-bottom:1px solid var(--bd);background:rgba(244,168,40,.06);border-left:3px solid var(--go);padding-left:25px}
@media(max-width:600px){
  .admin-nav-links{display:none}
  .admin-burger{display:flex;align-items:center}
}
@media(min-width:601px){.admin-mobile{display:none!important}}

/* ── PAGE ───────────── */
.page{max-width:820px;margin:0 auto;padding:28px 20px 80px;width:100%}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.06em;color:#F7F4EF;margin-bottom:24px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:12px;margin-top:24px;font-weight:500}

/* ── LOGIN ──────────── */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.login-box{background:var(--sl);border:1px solid var(--bd2);border-radius:var(--rl);padding:36px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;line-height:1;margin-bottom:6px}
.login-logo .v1{color:#F7F4EF}.login-logo .v2{color:var(--go)}
.login-sub{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:24px}
.login-note{font-size:12px;color:rgba(232,228,222,.3);margin-top:14px}

/* ── FORMS & INPUTS ─── */
.inp{width:100%;padding:10px 14px;background:var(--mi);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:12px;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--go)}
.inp-score{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:500;text-align:center;padding:10px;color:var(--go)}
.inp-sm{padding:7px 10px;font-size:13px;margin-bottom:0}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);display:block;margin-bottom:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0}
@media(max-width:500px){.field-row{grid-template-columns:1fr}}

/* ── BUTTONS ──────────  */
.btn{display:inline-block;width:auto;padding:12px 20px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .2s;text-align:center}
.btn-gold{background:var(--go);color:var(--ni)}
.btn-gold:hover{background:#f7b840;transform:translateY(-1px)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sm{padding:10px 14px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.btn-green{background:var(--gp);color:var(--gl);border:1px solid rgba(64,145,108,.3)}
.btn-green:hover{background:rgba(45,106,79,.25)}
.btn-red{background:var(--redp);color:#e05545;border:1px solid rgba(192,57,43,.3)}
.btn-red:hover{background:rgba(192,57,43,.25)}
.btn-danger{background:rgba(120,0,0,.3);color:#ff4455;border:1px solid rgba(180,0,0,.4)}
.btn-danger:hover{background:rgba(180,0,0,.4)}
.btn-edit-jogo{background:rgba(244,168,40,.12);color:var(--go);border:1px solid rgba(244,168,40,.25);border-radius:6px;padding:3px 8px;font-size:13px;cursor:pointer;transition:background .15s}
.btn-edit-jogo:hover{background:rgba(244,168,40,.25)}
.btn-del{background:none;border:none;color:var(--mu);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px;line-height:1}
.btn-del:hover{color:var(--red);background:var(--redp)}

/* ── CARDS ─────────── */
.form-card{background:var(--sl);border:1px solid var(--bd2);border-radius:var(--rl);padding:20px;margin-bottom:16px}
.form-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:14px;font-weight:500}

/* ── STATS ──────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr}}
.stat{background:var(--sl);border:1px solid var(--bd);border-radius:var(--r);padding:16px;text-align:center}
.stat-n{font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:500;color:var(--go);line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu)}

/* ── DASH ETAPAS ─────── */
.dash-etapa{display:flex;gap:0;align-items:stretch;background:var(--sl);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.dash-etapa-bar{width:4px;flex-shrink:0}
.dash-etapa-body{flex:1;padding:14px 16px}
.dash-etapa-name{font-weight:600;color:var(--tx);font-size:14px;margin-bottom:3px}
.dash-etapa-det{font-size:12.5px;color:var(--mu)}
.badge-open{display:inline-block;background:var(--gp);color:var(--gl);border:1px solid rgba(64,145,108,.3);padding:2px 8px;border-radius:20px;font-size:11px;letter-spacing:.06em;margin-top:6px}
.badge-pend{display:inline-block;background:var(--bd);color:var(--mu);padding:2px 8px;border-radius:20px;font-size:11px;letter-spacing:.06em;margin-top:6px}

/* ── ACTION GRID ─────── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:400px){.action-grid{grid-template-columns:1fr}}
.action-btn{background:var(--sl);border:1px solid var(--bd2);border-radius:var(--r);padding:18px 16px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--tx);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-weight:500}
.action-btn:hover{background:var(--mi);border-color:var(--go);color:var(--go)}
.action-btn span{font-size:1.3rem}

/* ── SCORE INPUT ─────── */
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end}
.score-player label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:6px}
.score-vs{font-size:1rem;font-weight:700;color:var(--mu);text-align:center;padding-bottom:0;letter-spacing:.1em;align-self:center}

/* ── RESULTS ─────────── */
.result-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13.5px}
.result-row:last-child{border-bottom:none}
.res-num{width:22px;height:22px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--mu);flex-shrink:0}
.res-name{flex:1;color:var(--mu)}
.res-win{color:var(--tx);font-weight:600}
.res-score{font-family:'DM Mono',monospace;font-size:13px;color:var(--go);flex-shrink:0;padding:0 6px}

/* ── RANKING TABLE ─── */
.rtable{width:100%;border-collapse:collapse;font-size:13.5px}
.rtable th{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);padding:8px 12px;border-bottom:1px solid var(--bd);text-align:left;font-weight:500}
.rtable th:last-child,.rtable td:last-child{text-align:right}
.rtable td{padding:11px 12px;border-bottom:1px solid var(--bd)}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:rgba(255,255,255,.02)}
.rpos{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.r1{background:var(--go);color:#5a3500}.r2{background:#9BA4B4;color:#1a2030}.r3{background:#8B6340;color:white}.rn{background:var(--bd);color:var(--mu)}
.rpts{font-family:'DM Mono',monospace;font-weight:500;color:var(--gl)}
.row-inactive td{opacity:.45}

/* ── JOGADORES ─────── */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}

/* ── ETAPAS ADMIN ──── */
.etapa-admin-card{display:flex;gap:0;background:var(--sl);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.etapa-admin-bar{width:5px;flex-shrink:0}
.etapa-admin-body{flex:1;padding:18px 20px}
.etapa-admin-title{font-weight:700;font-size:14px;color:var(--tx);margin-bottom:4px}
.etapa-admin-det{font-size:12.5px;color:var(--mu);margin-bottom:10px}
.etapa-admin-row{display:flex;align-items:center;margin-bottom:8px}
.ins-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}


.ins-del:hover{color:#ff6b7a}
.ins-sup{background:var(--gop);color:#c07d0a;border-color:rgba(244,168,40,.25)}

/* ── MSGS ───────────── */
.msg{padding:10px 16px;border-radius:var(--r);font-size:13.5px;margin-bottom:14px;font-weight:500}
.msg-ok{background:var(--gp);color:var(--gl);border:1px solid rgba(64,145,108,.3)}
.msg-error{background:var(--redp);color:#e05545;border:1px solid rgba(192,57,43,.3)}
.msg-float{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;min-width:280px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}

/* ── EMPTY ──────────── */
.empty{font-size:13.5px;color:var(--mu);padding:20px 0}

.pat-banner{padding:12px 20px;font-size:13.5px;font-weight:600;text-align:center;border-bottom:2px solid}
.pat-banner-warn{background:rgba(244,168,40,.15);color:#F4A828;border-color:rgba(244,168,40,.4)}
.pat-banner-crit{background:rgba(220,20,60,.15);color:#ff6b7a;border-color:rgba(220,20,60,.4)}

/* TORNEIO */
.torneio-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:10px}
.torneio-tab{background:none;border:1px solid var(--bd2);color:var(--mu);border-radius:50px;padding:7px 18px;font-size:12.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.torneio-tab:hover{color:var(--tx)}.torneio-tab.active{background:var(--go);border-color:var(--go);color:#1a1000;font-weight:700}
.cs-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.cs-row{display:flex;align-items:center;gap:10px}
.cs-num{font-size:12px;color:var(--go);font-weight:700;width:40px;flex-shrink:0;font-family:'DM Mono',monospace}
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:8px}
.grupo-card{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.grupo-card-full{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px}
.grupo-hdr{background:rgba(244,168,40,.12);border-bottom:1px solid var(--bd);padding:8px 14px;font-size:12px;font-weight:700;color:var(--go);text-transform:uppercase;letter-spacing:.06em}
.grupo-jog{padding:8px 14px;font-size:13.5px;color:var(--tx);border-bottom:1px solid rgba(255,255,255,.04)}
.grupo-jog:last-child{border-bottom:none}
.grupo-cs{color:var(--go);font-weight:700}
.grupo-classif{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;padding:12px}
.res-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.res-row:last-child{border-bottom:none}
.res-name{flex:1;font-size:13px;color:var(--mu)}.res-win{color:var(--cr);font-weight:600}
.res-score{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--go);background:rgba(244,168,40,.08);border:1px solid rgba(244,168,40,.2);border-radius:5px;padding:2px 8px}
/* Quadros */
.quadro-section{margin-bottom:24px}
.ronda-block{background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.ronda-titulo{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:10px;font-weight:600}
.jogo-row{margin-bottom:8px;border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.jogo-row.jogo-done{border-color:rgba(45,106,79,.3);background:rgba(45,106,79,.06)}
.jogo-row.jogo-bye{border-color:rgba(255,255,255,.06);background:rgba(255,255,255,.02);opacity:.6}
.jogo-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--go);margin-bottom:6px}
.jogo-inner{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.jogo-nome{flex:1;font-size:13px;color:var(--mu);min-width:80px}.jogo-win{color:var(--cr);font-weight:700}
.jogo-score-area{display:flex;align-items:center;gap:6px;flex-shrink:0}
.jogo-score-done{font-family:'DM Mono',monospace;color:var(--go);font-size:14px;min-width:60px;text-align:center}
.jogo-bye-badge{background:rgba(255,255,255,.08);color:var(--mu);font-size:11px;padding:2px 8px;border-radius:4px;letter-spacing:.04em}
.badge-done{background:rgba(45,106,79,.2);color:var(--gl);border:1px solid rgba(45,106,79,.35);padding:8px 16px;border-radius:8px;font-size:13.5px;display:inline-block}

/* ── BRACKET VISUAL ──────────────────────────────── */
.bracket-section{margin-bottom:32px}
.bracket-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--go);font-weight:700;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.bracket-wrap{display:flex;gap:0;overflow-x:auto;padding-bottom:12px;min-width:600px}
.bracket-col{display:flex;flex-direction:column;min-width:200px;flex-shrink:0}
.bracket-col-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);text-align:center;padding:6px 8px 10px;font-weight:600}
.bracket-slots{display:flex;flex-direction:column;flex:1}
.bracket-slot{display:flex;align-items:center;flex:1;position:relative;padding:4px 0}
.bracket-match{border:1px solid var(--bd);border-radius:8px;padding:6px 8px;background:rgba(255,255,255,.03);width:100%;margin:0 6px;transition:border-color .2s}
.bracket-match:hover{border-color:var(--bd2)}
.bracket-match.bk-done{border-color:rgba(45,106,79,.35);background:rgba(45,106,79,.06)}
.bracket-match.bk-bye{opacity:.5;border-style:dashed}
.bk-player{padding:5px 6px;border-radius:4px;font-size:12.5px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;display:flex;align-items:center;gap:6px}
.bk-player.bk-win{background:rgba(244,168,40,.12);color:var(--go);font-weight:700}
.bk-player.bk-tbd{color:rgba(255,255,255,.25);font-style:italic}
.bk-divider{height:1px;background:var(--bd);margin:3px 0}
.bk-score-row{display:flex;align-items:center;gap:4px;padding:4px 6px}
.bk-score-inp{width:52px;padding:6px 4px;background:rgba(255,255,255,.06);border:1px solid var(--bd2);border-radius:4px;color:var(--tx);font-family:'DM Mono',monospace;font-size:16px;text-align:center}
.bk-score-done{font-family:'DM Mono',monospace;font-size:12px;color:var(--go);min-width:50px;text-align:center;padding:3px 6px;background:rgba(244,168,40,.08);border-radius:4px}
.bk-btns{display:flex;gap:4px;margin-top:4px;padding:0 6px 4px}
/* connector lines using borders */
.bracket-conn{display:flex;align-items:center;width:14px;flex-shrink:0}
.bracket-conn-line{width:100%;height:0;border-top:2px solid var(--bd)}
/* vertical connectors via JS-rendered SVG between cols */
.bracket-sep{position:relative;width:14px;flex-shrink:0;display:flex;flex-direction:column}
/* losers bracket section */
.bracket-losers{margin-top:20px;background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:10px;padding:14px;overflow-x:auto}
.bracket-losers-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);font-weight:600;margin-bottom:10px}
.bracket-losers-grid{display:flex;gap:16px;flex-wrap:wrap}
.bracket-single{min-width:200px}
.bracket-single-title{font-size:10px;color:var(--mu);margin-bottom:6px;letter-spacing:.06em}
.swap-grid-wrap{background:rgba(13,27,42,.6);border:1px solid rgba(244,168,40,.3);border-radius:10px;padding:16px;margin-bottom:20px}
.swap-grid-title{font-size:13px;font-weight:700;color:var(--go);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.swap-grid-section{margin-bottom:12px}
.swap-grid-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.swap-grid{display:flex;flex-wrap:wrap;gap:6px}
.swap-pos-cell{cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 10px;min-width:70px;text-align:center;transition:all .15s}
.swap-pos-cell:hover{background:rgba(244,168,40,.2);border-color:var(--go)}
.swap-pos-cell.selected{background:var(--go);border-color:var(--go)}
.swap-pos-cell.selected .swap-pos-num,.swap-pos-cell.selected .swap-pos-name{color:#000}
.swap-pos-num{display:block;font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
