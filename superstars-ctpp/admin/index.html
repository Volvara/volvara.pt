function torneioActivo() {
  if(!state.torneioActivo) return null;
  return state.torneios.find(function(t){return t.etapaId===state.torneioActivo;});
}

// ── TORNEIO ACTIONS ───────────────────────────────────────────────────────
function doSelEtapaTorneio() {
  var sel = document.getElementById('sel-etapa-torneio');
  if(!sel||!sel.value) return;
  state.torneioActivo = sel.value;
  state.etapaActiva   = sel.value;
  // Find existing torneio or null
  var existing = state.torneios.find(function(t){return t.etapaId===sel.value;});
  state.torneioView = existing ? (existing.estado==='sorteio'?'sorteio':existing.estado==='grupos'?'grupos':existing.estado==='quadros'?'quadros':'classificacao') : 'sorteio';
  render();
}

function doCriarTorneio() {
  if(!state.torneioActivo) { showMsg('Selecciona uma etapa.','error'); return; }
  var sel = document.getElementById('num-grupos');
  var n = parseInt(sel ? sel.value : 5) || 5;
  var novo = TorneioEngine.criarTorneio(state.torneioActivo, n);
  state.torneios.push(novo);
  state.torneioView = 'sorteio';
  render();
  showMsg('Torneio criado. Selecciona as Cabeças de Série.','ok');
}

function doExecutarSorteio() {
  var t = torneioActivo();
  if(!t) return;
  var cs = (t.cabecasDeSerie||[]).filter(Boolean);
  if(cs.length < t.numGrupos) { showMsg('Selecciona '+t.numGrupos+' cabeças de série.','error'); return; }
  var etapa = state.etapas.find(function(e){return e.id===t.etapaId;});
  var inscritos = etapa && etapa.inscritos ? etapa.inscritos : [];
  var outros = inscritos.filter(function(id){return !cs.includes(id);});
  TorneioEngine.executarSorteio(t, cs, outros);
  render();
  showMsg('Sorteio realizado! Verifica os grupos.','ok');
}

function doAvancarGrupos() {
  var t = torneioActivo();
  if(!t) return;
  t.estado = 'grupos';
  state.torneioView = 'grupos';
  render();
}

async function doAddJogoGrupo(gi) {
  var t = torneioActivo();
  if(!t||state.saving) return;
  var grupo = t.grupos[gi];
  var ja  = document.getElementById('gj-ja-'+gi).value;
  var jb  = document.getElementById('gj-jb-'+gi).value;
  var sca = parseInt(document.getElementById('gj-sa-'+gi).value)||0;
  var scb = parseInt(document.getElementById('gj-sb-'+gi).value)||0;
  if(ja===jb){ showMsg('Selecciona jogadores diferentes.','error'); return; }
  if(sca===0&&scb===0){ showMsg('Score 0-0 inválido.','error'); return; }
  if(sca===scb){ showMsg('Empate não permitido.','error'); return; }
  var vencedor = sca>scb?ja:jb;
  if(!grupo.jogos) grupo.jogos = [];
  // Max jogos = combinações possíveis: C(n,2) = n*(n-1)/2
  var n = grupo.jogadores.length;
  var maxJogos = n*(n-1)/2;
  if(grupo.jogos.length >= maxJogos) {
    showMsg('Grupo já tem todos os jogos possíveis ('+maxJogos+' no máximo para '+n+' jogadores).','error'); return;
  }
  // Block duplicate pair
  var jaJogaram = grupo.jogos.some(function(g){
    return (g.ja===ja&&g.jb===jb)||(g.ja===jb&&g.jb===ja);
  });
  if(jaJogaram){ showMsg('Estes dois jogadores já jogaram neste grupo.','error'); return; }
  grupo.jogos.push({id:'gj'+genId(''),ja:ja,jb:jb,score_a:sca,score_b:scb,vencedor:vencedor});
  grupo.classificacaoEditada = false; // recalculate
  state.saving=true;
  try {
    await saveTorneios('Jogo G'+(gi+1)+': '+nomeById(ja)+' '+sca+'-'+scb+' '+nomeById(jb));
    showMsg('Resultado guardado.','ok');
  } catch(e) { grupo.jogos.pop(); showMsg('Erro: '+e.message,'error'); }
  state.saving=false; render();
}

async function doDelJogoGrupo(gi, ji) {
  var t = torneioActivo();
  if(!t||state.saving) return;
  var grupo = t.grupos[gi];
  var jogo = grupo.jogos[ji];
  if(!confirm('Eliminar resultado?')) return;
  grupo.jogos.splice(ji,1);
  grupo.classificacaoEditada = false;
  state.saving=true;
  try {
    await saveTorneios('Eliminar jogo G'+(gi+1));
    showMsg('Resultado eliminado.','ok');
  } catch(e) { grupo.jogos.splice(ji,0,jogo); showMsg('Erro: '+e.message,'error'); }
  state.saving=false; render();
}

function doEditClassifGrupo(gi) {
  var t = torneioActivo();
  if(!t) return;
  var grupo = t.grupos[gi];
  var cl = TorneioEngine.calcClassificacaoGrupo(grupo);
  var nomes = cl.map(function(c){return (state.jogadores.find(function(j){return j.id===c.jogId;})||{}).nome||c.jogId;});
  var novo = prompt('Classificação G'+(gi+1)+' — nomes por ordem (actual: '+nomes.join(', ')+')');
  if(!novo) return;
  var novaNomes = novo.split(',').map(function(s){return s.trim();});
  var novaClassif = novaNomes.map(function(nome,i){
    var jog = grupo.jogadores.map(function(id){
      return state.jogadores.find(function(j){return j.id===id;})||{id:id,nome:id};
    }).find(function(j){return j.nome===nome;});
    return jog ? {pos:i+1,jogId:jog.id} : null;
  }).filter(Boolean);
  if(novaClassif.length !== grupo.jogadores.length) {
    alert('Nomes não reconhecidos. Usa os nomes exactos: '+nomes.join(', '));
    return;
  }
  grupo.classificacao = novaClassif;
  grupo.classificacaoEditada = true;
  render();
}

async function doAvancarQuadros() {
  var t = torneioActivo();
  if(!t||state.saving) return;
  TorneioEngine.avancarParaQuadros(t);
  state.torneioView = 'quadros';
  state.saving=true;
  try {
    await saveTorneios('Gerar quadros etapa '+t.etapaId);
    showMsg('Quadros gerados!','ok');
  } catch(e) { showMsg('Erro: '+e.message,'error'); }
  state.saving=false; render();
}

async function doSaveJogoQuadro(quadro, rondaId, jogoId) {
  var t = torneioActivo();
  if(!t||state.saving) return;
  var q = quadro==='principal' ? t.quadroPrincipal : t.quadroB;
  var ronda = q.rondas.find(function(r){return r.id===rondaId;});
  if(!ronda) return;
  var jogo = ronda.jogos.find(function(j){return j.id===jogoId;});
  if(!jogo) return;
  var sa = parseInt(document.getElementById('sc-'+jogoId+'-a').value)||0;
  var sb = parseInt(document.getElementById('sc-'+jogoId+'-b').value)||0;
  if(sa===0&&sb===0){ showMsg('Score 0-0 inválido.','error'); return; }
  if(sa===sb){ showMsg('Empate não permitido.','error'); return; }
  var jogoAntigo = JSON.parse(JSON.stringify(jogo));
  jogo.score_a=sa; jogo.score_b=sb; jogo.vencedor=sa>sb?jogo.jogA:jogo.jogB;
  // Propagar para próxima ronda
  propagarResultado(t, quadro, rondaId, jogoId);
  state.saving=true;
  try {
    var nA=nomeById(jogo.jogA), nB=nomeById(jogo.jogB);
    await saveTorneios('Resultado '+quadro+' '+rondaId+': '+nA+' '+sa+'-'+sb+' '+nB);
    showMsg('Resultado guardado.','ok');
  } catch(e) {
    Object.assign(jogo, jogoAntigo);
    showMsg('Erro: '+e.message,'error');
  }
  state.saving=false; render();
}

// Propagação simples: se há ronda seguinte e o jogo tem posição conhecida, preencher
  function propagarResultado(torneio, quadro, rondaId, jogoId) {
    var q = quadro==='principal' ? torneio.quadroPrincipal : torneio.quadroB;

    function perdedor(jogo) {
      if(!jogo||!jogo.vencedor) return null;
      return jogo.vencedor===jogo.jogA ? jogo.jogB : jogo.jogA;
    }

    // ── QP: R1 → QF ──────────────────────────────────────────────────────
    if(quadro==='principal' && rondaId==='r1') {
      TorneioEngine.preencherQFdepoisR1(torneio);
      // 9/10: perdedores dos 2 jogos reais de R1
      var r1  = q.rondas.find(function(r){return r.id==='r1';});
      var r4  = q.rondas.find(function(r){return r.id==='r4';});
      if(r1&&r4) {
        var t910 = r4.jogos.find(function(j){return j.id==='qp_910';});
        if(t910) {
          var reais = r1.jogos.filter(function(j){return !j.bye && j.vencedor;});
          var perds = reais.map(function(j){return perdedor(j);}).filter(Boolean);
          if(perds.length>=1) t910.jogA = perds[0];
          if(perds.length>=2) t910.jogB = perds[1];
        }
      }
    }

    // ── QP: QF → SF + SF_perd ────────────────────────────────────────────
    if(quadro==='principal' && rondaId==='r2') {
      // Re-sync QF slots from R1 in case they were not filled (old bracket data)
      TorneioEngine.preencherQFdepoisR1(torneio);
      var r2 = q.rondas.find(function(r){return r.id==='r2';});
      var r3 = q.rondas.find(function(r){return r.id==='r3';});
      var r3p= q.rondas.find(function(r){return r.id==='r3p';});
      if(r2&&r3) {
        // SF1: W(QF1) vs W(QF2)
        if(r2.jogos[0]&&r2.jogos[0].vencedor) r3.jogos[0].jogA = r2.jogos[0].vencedor;
        if(r2.jogos[1]&&r2.jogos[1].vencedor) r3.jogos[0].jogB = r2.jogos[1].vencedor;
        // SF2: W(QF3) vs W(QF4)
        if(r2.jogos[2]&&r2.jogos[2].vencedor) r3.jogos[1].jogA = r2.jogos[2].vencedor;
        if(r2.jogos[3]&&r2.jogos[3].vencedor) r3.jogos[1].jogB = r2.jogos[3].vencedor;
      }
      if(r2&&r3p) {
        // SF_perd1: L(QF1) vs L(QF2)
        if(r2.jogos[0]&&r2.jogos[0].vencedor) r3p.jogos[0].jogA = perdedor(r2.jogos[0]);
        if(r2.jogos[1]&&r2.jogos[1].vencedor) r3p.jogos[0].jogB = perdedor(r2.jogos[1]);
        // SF_perd2: L(QF3) vs L(QF4)
        if(r2.jogos[2]&&r2.jogos[2].vencedor) r3p.jogos[1].jogA = perdedor(r2.jogos[2]);
        if(r2.jogos[3]&&r2.jogos[3].vencedor) r3p.jogos[1].jogB = perdedor(r2.jogos[3]);
      }
    }

    // ── QP: SF → Final + 3º/4º ────────────────────────────────────────────
    if(quadro==='principal' && rondaId==='r3') {
      // Re-sync SF slots from QF in case any are missing
      TorneioEngine.preencherQFdepoisR1(torneio); // ensures QF → SF slots are correct
      var r3c = q.rondas.find(function(r){return r.id==='r3';});
      var r4c = q.rondas.find(function(r){return r.id==='r4';});
      if(r3c&&r4c) {
        var fin = r4c.jogos.find(function(j){return j.id==='qp_final';});
        var t34 = r4c.jogos.find(function(j){return j.id==='qp_3lugar';});
        if(fin) {
          if(r3c.jogos[0]&&r3c.jogos[0].vencedor) fin.jogA = r3c.jogos[0].vencedor;
          if(r3c.jogos[1]&&r3c.jogos[1].vencedor) fin.jogB = r3c.jogos[1].vencedor;
        }
        if(t34) {
          if(r3c.jogos[0]&&r3c.jogos[0].vencedor) t34.jogA = perdedor(r3c.jogos[0]);
          if(r3c.jogos[1]&&r3c.jogos[1].vencedor) t34.jogB = perdedor(r3c.jogos[1]);
        }
      }
    }

    // ── QP: SF_perd → 5/6 + 7/8 ──────────────────────────────────────────
    if(quadro==='principal' && rondaId==='r3p') {
      var r3p2= q.rondas.find(function(r){return r.id==='r3p';});
      var r4p = q.rondas.find(function(r){return r.id==='r4';});
      if(r3p2&&r4p) {
        var t56 = r4p.jogos.find(function(j){return j.id==='qp_56';});
        var t78 = r4p.jogos.find(function(j){return j.id==='qp_78';});
        if(t56) {
          if(r3p2.jogos[0]&&r3p2.jogos[0].vencedor) t56.jogA = r3p2.jogos[0].vencedor;
          if(r3p2.jogos[1]&&r3p2.jogos[1].vencedor) t56.jogB = r3p2.jogos[1].vencedor;
        }
        if(t78) {
          if(r3p2.jogos[0]&&r3p2.jogos[0].vencedor) t78.jogA = perdedor(r3p2.jogos[0]);
          if(r3p2.jogos[1]&&r3p2.jogos[1].vencedor) t78.jogB = perdedor(r3p2.jogos[1]);
        }
      }
    }

    // ── QB: QF → SF ───────────────────────────────────────────────────────
    if(quadro==='b' && rondaId==='r1') {
      TorneioEngine.preencherSFdoQB(torneio);
    }

    // ── QB: SF → Final + 13/14 ────────────────────────────────────────────
    if(quadro==='b' && rondaId==='r2') {
      // Re-sync QB SF from QF
      TorneioEngine.preencherSFdoQB(torneio);
      var r2qb = q.rondas.find(function(r){return r.id==='r2';});
      var r3qb = q.rondas.find(function(r){return r.id==='r3';});
      if(r2qb&&r3qb) {
        var fqb   = r3qb.jogos.find(function(j){return j.id==='qb_final';});
        var t1314 = r3qb.jogos.find(function(j){return j.id==='qb_1314';});
        if(fqb) {
          if(r2qb.jogos[0]&&r2qb.jogos[0].vencedor) fqb.jogA = r2qb.jogos[0].vencedor;
          if(r2qb.jogos[1]&&r2qb.jogos[1].vencedor) fqb.jogB = r2qb.jogos[1].vencedor;
        }
        if(t1314) {
          if(r2qb.jogos[0]&&r2qb.jogos[0].vencedor) t1314.jogA = perdedor(r2qb.jogos[0]);
          if(r2qb.jogos[1]&&r2qb.jogos[1].vencedor) t1314.jogB = perdedor(r2qb.jogos[1]);
        }
      }
    }
  }



function doIniciarSwap() {
  state.swapMode = !state.swapMode;
  state.swapSel = null;
  render();
}

function doSelSwap(quadro, pos) {
  if(!state.swapSel) {
    state.swapSel = {quadro: quadro, pos: pos};
    render();
    return;
  }
  // Second click — do the swap
  var t = torneioActivo();
  if(!t) return;
  var posicoes = quadro === 'principal' ? t.quadroPrincipal.posicoes : t.quadroB.posicoes;
  var selPosicoes = state.swapSel.quadro === 'principal' ? t.quadroPrincipal.posicoes : t.quadroB.posicoes;
  var pA = selPosicoes.find(function(p){return p.pos===state.swapSel.pos;});
  var pB = posicoes.find(function(p){return p.pos===pos;});
  if(!pA||!pB) { state.swapSel=null; render(); return; }
  // Swap jogIds
  var tmpId = pA.jogId; var tmpBye = pA.bye;
  pA.jogId = pB.jogId; pA.bye = pB.bye;
  pB.jogId = tmpId;    pB.bye = tmpBye;
  // Rebuild bracket from new positions
  TorneioEngine.preencherPrimeirasRondas(t);
  state.swapSel = null;
  state.swapMode = false;
  state.saving = true;
  render();
  saveTorneios('Swap posições nos quadros').then(function(){
    showMsg('Posições trocadas e quadros actualizados.','ok');
  }).catch(function(e){
    showMsg('Erro ao guardar: '+e.message,'error');
  }).finally(function(){
    state.saving=false; render();
  });
}

function doMoverPosicao(quadro, posFrom, posTo) {
  var t = torneioActivo();
  if(!t) return;
  var posicoes = quadro === 'principal' ? t.quadroPrincipal.posicoes : t.quadroB.posicoes;
  var pFrom = posicoes.find(function(p){return p.pos===posFrom;});
  var pTo   = posicoes.find(function(p){return p.pos===posTo;});
  if(!pFrom||!pTo) return;
  var tmpId=pFrom.jogId; var tmpBye=pFrom.bye;
  pFrom.jogId=pTo.jogId; pFrom.bye=pTo.bye;
  pTo.jogId=tmpId;       pTo.bye=tmpBye;
  TorneioEngine.preencherPrimeirasRondas(t);
  render();
}

async function doConcluirTorneio() {
  var t = torneioActivo();
  if(!t||state.saving) return;
  var cl = TorneioEngine.calcClassificacaoFinal(t);
  if(!cl.length){ showMsg('Sem classificação para guardar. Completa todos os jogos.','error'); return; }
  var n = t.grupos.reduce(function(s,g){return s+g.jogadores.length;},0);
  // Count expected positions: some may be structurally unfillable (e.g. no real QF loser)
  var expectedMax = n;
  // Check if all QB QFs are byes — if so, max fillable positions is less
  var r1qbCheck = t.quadroB.rondas ? t.quadroB.rondas.find(function(r){return r.id==='r1';}) : null;
  var hasRealQBQF = r1qbCheck && r1qbCheck.jogos.some(function(j){return j.jogA&&j.jogB&&!j.bye;});
  if(!hasRealQBQF) expectedMax = n - 1; // 15th place structurally unavailable via QF
  if(cl.length < expectedMax) {
    if(!confirm('Classificação incompleta: '+cl.length+'/'+expectedMax+' lugares preenchidos.\nJogos por completar nos quadros. Confirmar mesmo assim?')) return;
  }
  t.classificacaoFinal = cl;
  t.estado = 'concluido';
  state.saving=true;
  try {
    await saveTorneios('Concluir torneio '+t.etapaId);
    showMsg('Torneio concluído! '+cl.length+'/'+n+' posições guardadas.','ok');
    state.torneioView = 'classificacao';
  } catch(e) { showMsg('Erro: '+e.message,'error'); }
  state.saving=false; render();
}

async function doLogin(){
  if(state._loggingIn) return;  // previne dupla invocação
  state._loggingIn = true;
  // Capturar password ANTES de qualquer render()
  var pwEl = document.getElementById('pw-input');
  var pw = pwEl ? pwEl.value.trim() : '';
  if(!pw){
    state._loggingIn = false;
    showMsg('Introduz a password.','error');
    return;
  }
  var encPat = state.config_raw ? state.config_raw.pat_encrypted : null;
  if(!encPat){
    state._loggingIn = false;
    showMsg('Config não carregou. Tenta de novo.','error');
    return;
  }
  // Passo 1: desencriptar
  var pat;
  try {
    pat = await decrypt(encPat, pw);
  } catch(e) {
    state._loggingIn = false;
    showMsg('Password incorrecta.','error');
    return;
  }
  // Passo 2: validar token
  try {
    var r = await fetch('https://api.github.com/user', { headers:{Authorization:'Bearer '+pat, Accept:'application/vnd.github.v3+json'} });
    if(!r.ok) {
      state._loggingIn = false;
      showMsg('Token GitHub inválido. Regenera o PAT.','error');
      return;
    }
  } catch(e) {
    state._loggingIn = false;
    showMsg('Sem ligação ao GitHub.','error');
    return;
  }
  // Passo 3: carregar dados
  state.pat = pat; state.authed = true;
  showMsg('Login OK. A carregar dados…','ok');
  try {
    await loadData();
  } catch(e) {
    state._loggingIn = false;
    var msg = e.message || 'erro desconhecido';
    if(msg.indexOf('Failed to fetch')>=0) msg = 'Sem resposta do GitHub. Verifica a ligação ou se o PAT expirou.';
    showMsg('Erro ao carregar dados: '+msg,'error');
    state.authed=false; state.pat=null;
    return;
  }
  state._loggingIn = false;
  // Pre-select torneio if only one exists
  if(state.torneios.length === 1) {
    var t = state.torneios[0];
    state.torneioActivo = t.etapaId;
    state.etapaActiva   = t.etapaId;
    state.torneioView   = t.estado==='quadros'?'quadros':t.estado==='grupos'?'grupos':t.estado==='sorteio'?'sorteio':'classificacao';
  }
  state.view='dashboard'; render();
}

function doLogout(){
  state.pat=null; state.authed=false; state.view='login'; render();
}

async function doSaveResultado(){
  if(state.saving) return;
  var ja  = document.getElementById('sel-ja').value;
  var jb  = document.getElementById('sel-jb').value;
  var sca = parseInt(document.getElementById('sc-a').value)||0;
  var scb = parseInt(document.getElementById('sc-b').value)||0;
  if(ja===jb){ showMsg('Selecciona dois jogadores diferentes.','error'); return; }
  if(sca===0&&scb===0){ showMsg('Score 0–0 não é válido.','error'); return; }
  if(sca===scb){ showMsg('Empate não permitido — há sempre um vencedor.','error'); return; }
  var vencedor = sca>scb?ja:jb;
  // Disable save button during save
  var saveBtn = document.getElementById('btn-save-res');
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='A guardar…'; }

  if(state.editingJogoId !== null) {
    var idx = state.jogos.findIndex(function(g){return g.id===state.editingJogoId;});
    if(idx === -1){ showMsg('Jogo não encontrado.','error'); return; }
    var jogoAntigo = Object.assign({}, state.jogos[idx]);
    state.jogos[idx] = Object.assign({}, state.jogos[idx], {ja:ja,jb:jb,score_a:sca,score_b:scb,vencedor:vencedor});
    state.editingJogoId = null;
    state.saving=true;
    try {
      var nA = (state.jogadores.find(function(j){return j.id===ja;})||{}).nome||ja;
      var nB = (state.jogadores.find(function(j){return j.id===jb;})||{}).nome||jb;
      await saveResultados('Editar resultado: '+nA+' '+sca+'-'+scb+' '+nB);
      state.saving=false; render();
      showMsg('Resultado actualizado.','ok');
    } catch(e) {
      state.jogos[idx] = jogoAntigo;
      state.saving=false; render();
      showMsg('Erro: '+e.message,'error');
    }
    return;
  }

  // New game
  var jogo = {id:'g'+genId(''),etapa:state.etapaActiva,ja:ja,jb:jb,score_a:sca,score_b:scb,vencedor:vencedor};
  state.jogos.push(jogo);
  state.saving=true;
  try {
    await saveResultados('Resultado: '+nomeById(ja)+' '+sca+'-'+scb+' '+nomeById(jb));
    state.saving=false; render();
    showMsg('Resultado guardado! Site actualiza em ~30s.','ok');
  } catch(e) {
    state.jogos.pop();
    state.saving=false; render();
    showMsg('Erro: '+e.message,'error');
  }
}

async function doDeleteJog(id) {
  var jog = state.jogadores.find(function(j){return j.id===id;});
  if(!jog) return;
  var jogosDoJogador = state.jogos.filter(function(g){return g.ja===id||g.jb===id;}).length;
  var confirmMsg = 'Apagar "'+jog.nome+'" definitivamente?'
    +(jogosDoJogador>0?'\n\n⚠️ Isto vai apagar também '+jogosDoJogador+' jogo(s) desta época e remover as suas stats do ranking.':'')
    +'\n\nEsta acção não pode ser desfeita.';
  if(!confirm(confirmMsg)) return;
  // Remove player
  state.jogadores = state.jogadores.filter(function(j){return j.id!==id;});
  // Remove all their games
  state.jogos = state.jogos.filter(function(g){return g.ja!==id&&g.jb!==id;});
  state.saving = true; render();
  try {
    await saveJogadores('Apagar jogador: '+jog.nome);
    await saveResultados('Apagar jogos de: '+jog.nome);
    showMsg(jog.nome+' apagado e stats removidas.','ok');
  } catch(e) {
    showMsg('Erro ao apagar: '+e.message,'error');
  }
  state.saving = false; render();
}

async function doToggleJog(id){
  var jog = state.jogadores.find(function(j){return j.id===id;});
  if(!jog) return;
  jog.ativo = !jog.ativo;
  state.saving=true;
  try {
    await saveJogadores((jog.ativo?'Activar':'Desactivar')+': '+jog.nome);
    state.saving=false; render();
    showMsg(jog.nome+(jog.ativo?' activado':' desactivado')+'.','ok');
  } catch(e) {
    jog.ativo=!jog.ativo;
    state.saving=false; render();
    showMsg('Erro: '+e.message,'error');
  }
}

async function doRemoveInscrito(etapaId, jogId) {
  var etapa = state.etapas.find(function(e){return e.id===etapaId;});
  if(!etapa||!etapa.inscritos) return;
  var nome = nomeById(jogId);
  if(!confirm('Remover "'+nome+'" da lista de inscritos?')) return;
  etapa.inscritos = etapa.inscritos.filter(function(id){return id!==jogId;});
  state.saving=true;
  try {
    await saveEtapas('Remover inscrito: '+nome+' de '+labelEtapa(etapa));
    showMsg(nome+' removido dos inscritos.','ok');
  } catch(e) {
    etapa.inscritos.push(jogId); // rollback
    showMsg('Erro: '+e.message,'error');
  }
  state.saving=false; render();
}

async function doAddInscrito(etapaId){
  var sel = document.getElementById('add-ins-'+etapaId);
  if(!sel||!sel.value) return;
  var etapa = state.etapas.find(function(e){return e.id===etapaId;});
  if(!etapa) return;
  if(!etapa.inscritos) etapa.inscritos=[];
  if(etapa.inscritos.includes(sel.value)){
    showMsg('Jogador já está inscrito nesta etapa.','error'); return;
  }
  var isSuplente = etapa.limite && etapa.inscritos.length >= etapa.limite;
  etapa.inscritos.push(sel.value);
  state.saving=true;
  var addInsBtn = document.querySelector('[data-act="addInscrito"][data-etapa="'+etapaId+'"]');
  if(addInsBtn) addInsBtn.disabled=true;
  try {
    await saveEtapas('Inscrito: '+nomeById(sel.value)+' em '+labelEtapa(etapa));
    state.saving=false; render();
    showMsg(nomeById(sel.value)+(isSuplente?' adicionado como suplente.':' inscrito.'),'ok');
  } catch(e) {
    etapa.inscritos.pop();
    state.saving=false; render();
    showMsg('Erro: '+e.message,'error');
  }
}

async function doSetEstado(etapaId, estado){
  var etapa = state.etapas.find(function(e){return e.id===etapaId;});
  if(!etapa) return;
  var old = etapa.estado;
  etapa.estado=estado;
  try {
    await saveEtapas('Estado '+labelEtapa(etapa)+': '+estado);
    showMsg('Estado actualizado.','ok');
  } catch(e) {
    etapa.estado=old;
    showMsg('Erro: '+e.message,'error');
  }
  render();
}

function doExportCSV(){
  var cats=['senior','vermelha','verde','laranja'];
  var csv='Categoria,Posição,Nome,Pts,V,D,±Enc,J,±J\n';
  cats.forEach(function(cat){
    var label='Super Stars Senior';
    calcRanking(cat,'todas').forEach(function(r,i){
      csv+='"'+label+'",'+(i+1)+',"'+r.nome+'",'+r.pts+','+r.vitorias+','+r.derrotas+','+r.dif_enc+','+r.enc+','+r.dif_games+'\n';
    });
  });
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ranking-superstars-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── SETUP ────────────────────────────────────────────────────────────────
async function init(){
  // ── PERMANENT CLICK HANDLER — capture:true, registered ONCE, immune to renders ──
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-act]');

    // Mobile menu: close on outside click (no data-act needed)
    var mob = document.getElementById('admin-mobile');
    var burgerBtn = document.getElementById('admin-burger-btn');
    if(mob && mob.classList.contains('open') && burgerBtn &&
       !mob.contains(e.target) && !burgerBtn.contains(e.target)) {
      mob.classList.remove('open');
      var icon = document.getElementById('admin-burger-icon');
      if(icon) icon.innerHTML = '<line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="11" x2="19" y2="11"/><line x1="3" y1="16" x2="19" y2="16"/>';
    }

    if(!el) return;
    var act = el.getAttribute('data-act');

    // Login button handled separately in bindEvents — skip here
    if(act === 'login') return;

    // Block all actions when not authed (except handled by bindEvents)
    if(!state.authed) return;

    if(act==='nav') { state.view=el.getAttribute('data-view'); render(); }
    else if(act==='logout') doLogout();
    else if(act==='mobileAdminNav') {
      state.view=el.getAttribute('data-view');
      var m=document.getElementById('admin-mobile');
      if(m) m.classList.remove('open');
      var ic=document.getElementById('admin-burger-icon');
      if(ic) ic.innerHTML='<line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="11" x2="19" y2="11"/><line x1="3" y1="16" x2="19" y2="16"/>';
      render();
    }
    else if(act==='goTorneio')        { state.view='torneio'; state.etapaActiva=el.getAttribute('data-etapa'); render(); }
    else if(act==='goJogadores')      { state.view='jogadores'; render(); }
    else if(act==='goEtapas')         { state.view='etapas'; render(); }
    else if(act==='exportCSV')        doExportCSV();
    else if(act==='delJogo')          doDelJogo(parseInt(el.getAttribute('data-idx')));
    else if(act==='addJogador')       doAddJogador();
    else if(act==='toggleJog')        doToggleJog(el.getAttribute('data-id'));
    else if(act==='editJog')          doEditJog(el.getAttribute('data-id'));
    else if(act==='editJogo')         doEditJogo(parseInt(el.getAttribute('data-idx')));
    else if(act==='saveEditJog')      doSaveEditJog(el.getAttribute('data-id'));
    else if(act==='cancelEditJog')    { state.editingJogId=null; render(); }
    else if(act==='deleteJog')        doDeleteJog(el.getAttribute('data-id'));
    else if(act==='addInscrito')      doAddInscrito(el.getAttribute('data-etapa'));
    else if(act==='removeInscrito')   doRemoveInscrito(el.getAttribute('data-etapa'), el.getAttribute('data-id'));
    else if(act==='selEtapaTorneio')  doSelEtapaTorneio();
    else if(act==='criarTorneio')     doCriarTorneio();
    else if(act==='executarSorteio')  doExecutarSorteio();
    else if(act==='avancarGrupos')    doAvancarGrupos();
    else if(act==='torneioTab') {
      state.torneioView = el.getAttribute('data-tab');
      if(el.getAttribute('data-tab') === 'quadros') {
        var _ta = torneioActivo();
        if(_ta) {
          TorneioEngine.preencherQFdepoisR1(_ta);
          TorneioEngine.preencherSFdoQB(_ta);
        }
      }
      render();
    }
    else if(act==='addJogoGrupo')     doAddJogoGrupo(parseInt(el.getAttribute('data-gi')));
    else if(act==='delJogoGrupo')     doDelJogoGrupo(parseInt(el.getAttribute('data-gi')),parseInt(el.getAttribute('data-ji')));
    else if(act==='editClassifGrupo') doEditClassifGrupo(parseInt(el.getAttribute('data-gi')));
    else if(act==='avancarQuadros')   doAvancarQuadros();
    else if(act==='saveJogoQuadro')   doSaveJogoQuadro(el.getAttribute('data-quadro'),el.getAttribute('data-ronda'),el.getAttribute('data-jogo'));
    else if(act==='editJogoQuadro')   doEditJogoQuadro(el.getAttribute('data-quadro'),el.getAttribute('data-ronda'),el.getAttribute('data-jogo'));
    else if(act==='concluirTorneio')  doConcluirTorneio();
    else if(act==='resetarEtapa')     doResetarEtapa();
    else if(act==='iniciarSwap')      doIniciarSwap();
    else if(act==='selSwap')          doSelSwap(el.getAttribute('data-quadro'), parseInt(el.getAttribute('data-pos')));
  }, true); // capture:true — fires before any child stopPropagation
  var urls = [
    'https://raw.githubusercontent.com/'+REPO_OWNER+'/'+REPO_NAME+'/main/superstars-ctpp/data/config.json',
    '../data/config.json',
    './data/config.json'
  ];
  for(var i=0;i<urls.length;i++){
    try {
      var r = await fetch(urls[i]);
      if(r.ok){ state.config_raw = await r.json(); break; }
    } catch(e){}
  }
  render();
}

window.updateEscalaoVis = function(){};
init();

})();

</script>
