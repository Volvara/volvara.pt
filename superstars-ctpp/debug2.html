<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Debug v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0D1B2A;color:#a8d8b8;padding:20px;font-size:13px;line-height:1.9}
input{width:100%;padding:10px;background:#1B2B3A;border:1px solid #2d3f52;border-radius:6px;color:#E8E4DE;font-size:13px;font-family:monospace;margin-bottom:10px}
button{background:#F4A828;color:#0D1B2A;border:none;padding:10px 20px;border-radius:6px;font-weight:bold;cursor:pointer;margin-bottom:16px;font-size:14px}
.log{background:#1B2B3A;border:1px solid #2d3f52;border-radius:6px;padding:16px;white-space:pre-wrap;word-break:break-all;min-height:100px}
.ok{color:#2ecc71}.err{color:#e74c3c}.warn{color:#F4A828}.info{color:#3498db}
label{color:#F4A828;display:block;margin-bottom:6px;font-size:12px;text-transform:uppercase;letter-spacing:.1em}
</style>
</head>
<body>
<div style="color:#F4A828;font-size:1.2rem;font-weight:bold;margin-bottom:16px">🔍 Debug v2 — Super Stars Admin</div>

<label>Password a testar</label>
<input type="text" id="pw" placeholder="escreve a password aqui (visível para confirmar)">
<button onclick="run()">▶ Diagnosticar</button>

<div class="log" id="log">Aguarda...</div>

<script>
var L = document.getElementById('log');
function p(msg, cls){ L.innerHTML += '<span class="'+(cls||'')+'">'+msg+'</span>\n'; }
function clear(){ L.innerHTML=''; }

async function deriveKey(password) {
  var enc = new TextEncoder();
  var keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode('superstars-ctpp-2026'), iterations:100000, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function decrypt(b64, password) {
  var key = await deriveKey(password);
  var buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  var iv  = buf.slice(0,12);
  var ct  = buf.slice(12);
  var pt  = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ct);
  return new TextDecoder().decode(pt);
}

async function run(){
  clear();
  var pw = document.getElementById('pw').value;
  p('Password introduzida: "'+pw+'" ('+pw.length+' chars)', 'info');
  p('Password após trim: "'+pw.trim()+'" ('+pw.trim().length+' chars)', 'info');
  p('');

  p('── 1. Carregar config.json ──', 'warn');
  var config = null;
  var urls = [
    '../data/config.json',
    'https://raw.githubusercontent.com/Volvara/volvara.pt/main/superstars-ctpp/data/config.json'
  ];
  for(var i=0;i<urls.length;i++){
    try {
      p('  Tentar: '+urls[i]);
      var r = await fetch(urls[i]);
      p('  HTTP status: '+r.status);
      if(r.ok){ config = await r.json(); p('  ✓ OK', 'ok'); break; }
    } catch(e){ p('  ✗ '+e.message, 'err'); }
  }
  if(!config){ p('FALHA: config não carregou', 'err'); return; }

  var encPat = config.pat_encrypted;
  p('');
  p('── 2. Verificar pat_encrypted ──', 'warn');
  p('  Comprimento: '+encPat.length+' chars');
  p('  Primeiros 20: '+encPat.substring(0,20)+'...');
  p('  Últimos 5: ...'+encPat.substring(encPat.length-5));
  if(!encPat || encPat.length < 50){ p('  ✗ INVÁLIDO', 'err'); return; }
  p('  ✓ OK', 'ok');

  p('');
  p('── 3. Desencriptar ──', 'warn');
  p('  Salt usado: "superstars-ctpp-2026"');
  p('  Iterations: 100000');
  p('  Algoritmo: PBKDF2 → AES-GCM-256');

  var pwToUse = pw.trim();
  try {
    var pat = await decrypt(encPat, pwToUse);
    p('  ✓ DESENCRIPTADO!', 'ok');
    p('  Comprimento PAT: '+pat.length+' chars');
    p('  Início: '+pat.substring(0,15)+'...');

    p('');
    p('── 4. Validar token no GitHub ──', 'warn');
    var gr = await fetch('https://api.github.com/user', {
      headers:{ Authorization:'Bearer '+pat, Accept:'application/vnd.github.v3+json' }
    });
    p('  GitHub API status: '+gr.status);
    if(gr.ok){
      var u = await gr.json();
      p('  ✓ TOKEN VÁLIDO! User: '+u.login, 'ok');
      p('');
      p('✅ TUDO OK — Login deve funcionar!', 'ok');
    } else {
      var eg = await gr.json();
      p('  ✗ Token inválido: '+(eg.message||gr.status), 'err');
      p('  → Regenera o PAT no GitHub', 'err');
    }
  } catch(e) {
    p('  ✗ FALHOU: '+e.message, 'err');
    p('  → Esta password NÃO corresponde ao que foi usado no setup-pat.html', 'err');
    p('');
    p('SOLUÇÃO: volta ao setup-pat.html e re-encripta com esta password.', 'warn');
  }
}
</script>
</body>
</html>
