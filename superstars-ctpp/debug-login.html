<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Debug Login · Super Stars</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0D1B2A;color:#a8d8b8;padding:24px;font-size:13px;line-height:1.8}
h2{color:#F4A828;margin-bottom:16px;font-size:1rem}
input{width:100%;padding:10px;background:#1B2B3A;border:1px solid #2d3f52;border-radius:6px;color:#E8E4DE;font-size:13px;font-family:monospace;margin-bottom:10px}
button{background:#F4A828;color:#0D1B2A;border:none;padding:10px 20px;border-radius:6px;font-weight:bold;cursor:pointer;margin-bottom:20px}
.log{background:#1B2B3A;border:1px solid #2d3f52;border-radius:6px;padding:16px;white-space:pre-wrap;word-break:break-all;line-height:2}
.ok{color:#27AE60}.err{color:#E74C3C}.info{color:#F4A828}
</style>
</head>
<body>
<h2>🔍 Debug Login — Super Stars CTPP</h2>
<input type="password" id="pw" placeholder="Password">
<button onclick="runDiag()">Diagnosticar</button>
<div class="log" id="log">Aguarda...</div>
<script>
var log = document.getElementById('log');
function print(msg, cls){ log.innerHTML += '<span class="'+(cls||'')+'">' + msg + '</span>\n'; }

async function deriveKey(password) {
  var enc = new TextEncoder();
  var keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode('superstars-ctpp-2026'), iterations:100000, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function decrypt(b64, password) {
  var key = await deriveKey(password);
  var buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  var iv  = buf.slice(0,12);
  var ct  = buf.slice(12);
  var pt  = await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ct);
  return new TextDecoder().decode(pt);
}

async function runDiag(){
  log.innerHTML = '';
  var pw = document.getElementById('pw').value;
  print('── Passo 1: Carregar config.json ──', 'info');

  var config = null;
  var urls = [
    '../data/config.json',
    'https://raw.githubusercontent.com/Volvara/volvara.pt/main/superstarsctpp/data/config.json'
  ];
  for(var i=0;i<urls.length;i++){
    try {
      print('  Tentar: ' + urls[i]);
      var r = await fetch(urls[i]);
      print('  Status: ' + r.status);
      if(r.ok){
        config = await r.json();
        print('  ✓ Config carregado via: ' + urls[i], 'ok');
        break;
      }
    } catch(e){ print('  ✗ Erro: ' + e.message, 'err'); }
  }

  if(!config){ print('\n✗ FALHA: config.json não carregou de nenhum URL', 'err'); return; }

  print('\n── Passo 2: Verificar pat_encrypted ──', 'info');
  var enc = config.pat_encrypted;
  if(!enc || enc.length < 10){
    print('✗ FALHA: pat_encrypted está vazio ou inválido', 'err');
    print('  Valor: "' + enc + '"', 'err');
    return;
  }
  print('  ✓ pat_encrypted presente (' + enc.length + ' chars)', 'ok');
  print('  Primeiros 30 chars: ' + enc.substring(0,30) + '...', 'ok');

  print('\n── Passo 3: Desencriptar com password ──', 'info');
  print('  Password length: ' + pw.length + ' chars');
  var pat = null;
  try {
    pat = await decrypt(enc, pw);
    print('  ✓ Desencriptado! PAT começa com: ' + pat.substring(0,8) + '...', 'ok');
  } catch(e){
    print('  ✗ FALHA na desencriptação: ' + e.message, 'err');
    print('  → Password errada OU encriptado com salt diferente', 'err');
    return;
  }

  print('\n── Passo 4: Validar PAT no GitHub ──', 'info');
  try {
    var gr = await fetch('https://api.github.com/user', {
      headers:{ Authorization:'token ' + pat }
    });
    print('  Status GitHub API: ' + gr.status);
    if(gr.ok){
      var u = await gr.json();
      print('  ✓ Token válido! User: ' + u.login, 'ok');
    } else {
      var e2 = await gr.json();
      print('  ✗ Token inválido: ' + (e2.message||gr.status), 'err');
      print('  → Regenera o PAT no GitHub', 'err');
    }
  } catch(e){ print('  ✗ Erro de rede: ' + e.message, 'err'); }
}
</script>
</body>
</html>
